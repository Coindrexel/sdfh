<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RosArbitr — управление рестримами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            color: #eef2ff;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: #11131c;
            border: 1px solid #2a2f3f;
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            background: #1e1f2e;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
        }

        button {
            background: #1e1f2e;
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
        }

        button.primary {
            background: #7c3aed;
            border-color: #a855f7;
            color: white;
        }

        button.warning {
            background: #b91c1c20;
            border-color: #b91c1c;
            color: #f87171;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #11131c;
            border: 1px solid #a855f7;
            border-radius: 28px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }

        .modal-content h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            background: #1e1f2e;
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            margin-bottom: 14px;
            color: white;
            font-size: 14px;
        }

        .error-text {
            color: #f87171;
            text-align: center;
            margin-top: 12px;
        }

        .hidden {
            display: none;
        }

        .browsers-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .browser-card {
            background: #11131c;
            border: 1px solid #2a2f3f;
            border-radius: 20px;
            overflow: hidden;
        }

        .browser-header {
            background: #1e1f2e;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #2a2f3f;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            min-width: 150px;
            background: #0f1119;
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 8px 14px;
            color: white;
            font-size: 13px;
        }

        .go-btn {
            background: #7c3aed;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }

        .browser-frame {
            width: 100%;
            height: 400px;
            border: none;
            background: #0f1119;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }

        .stream-card {
            background: #11131c;
            border: 1px solid #2a2f3f;
            border-radius: 20px;
            overflow: hidden;
        }

        .stream-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e1f2e;
        }

        .stream-name {
            font-weight: 700;
            font-size: 16px;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 40px;
            background: #1e1f2e;
        }

        .status-badge.online {
            background: #1e3a2e;
            color: #4ade80;
            border: 1px solid #2e7d32;
        }

        .status-badge.offline {
            background: #3b1e1e;
            color: #f87171;
            border: 1px solid #b91c1c;
        }

        .stream-stats {
            padding: 10px 16px;
            background: #0f1119;
            font-size: 11px;
            color: #9ca3af;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #1e1f2e;
        }

        .stream-actions {
            padding: 14px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        @media (max-width: 640px) {
            .browser-frame {
                height: 300px;
            }
            .streams-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>RosArbitr</h1>
        </div>
        <div class="user-area">
            <span class="username" id="userNameDisplay">Гость</span>
            <button id="logoutBtn" class="secondary">🚪 Выйти</button>
        </div>
    </div>

    <!-- МОДАЛКА 1: ПОДКЛЮЧЕНИЕ К СЕРВЕРУ -->
    <div id="serverModal" class="modal active">
        <div class="modal-content">
            <h2>🔌 Подключение к серверу</h2>
            <input type="text" id="serverInput" placeholder="АДРЕС">
            <button id="connectBtn" class="primary" style="width:100%">Подключиться</button>
            <div id="serverError" class="error-text"></div>
        </div>
    </div>

    <!-- МОДАЛКА 2: ЛОГИН / ПАРОЛЬ -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Авторизация</h2>
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginAction" class="primary" style="width:100%">Войти</button>
            <div id="loginError" class="error-text"></div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ПАНЕЛЬ -->
    <div id="mainPanel" class="hidden">
        <div class="browsers-section">
            <div class="browser-card">
                <div class="browser-header">
                    <span>🎥 KICK</span>
                    <input type="text" id="kickUrl" class="url-input" value="https://kick.com/">
                    <button class="go-btn" onclick="navigateKick()">Перейти</button>
                </div>
                <iframe id="kickFrame" class="browser-frame" src="https://kick.com/"></iframe>
            </div>
            <div class="browser-card">
                <div class="browser-header">
                    <span>⚡ Накрутка</span>
                    <input type="text" id="promoUrl" class="url-input" value="https://stream-promotion.ru/">
                    <button class="go-btn" onclick="navigatePromo()">Перейти</button>
                </div>
                <iframe id="promoFrame" class="browser-frame" src="https://stream-promotion.ru/"></iframe>
            </div>
        </div>

        <div class="section-header">
            <h2>🎛️ Управление стримами</h2>
            <div>
                <button id="refreshBtn">🔄 Обновить</button>
                <button id="addObsBtn" class="primary">➕ Добавить OBS</button>
            </div>
        </div>
        <div id="streamsList" class="streams-grid">
            <div class="loading">Загрузка стримов...</div>
        </div>
    </div>
</div>

<!-- МОДАЛКА ДОБАВЛЕНИЯ OBS -->
<div id="addObsModal" class="modal">
    <div class="modal-content">
        <h2>➕ Добавить OBS</h2>
        <input type="text" id="obsName" placeholder="Название">
        <input type="text" id="obsHost" placeholder="АДРЕС">
        <input type="number" id="obsPort" placeholder="Порт">
        <input type="password" id="obsPassword" placeholder="Пароль">
        <button id="saveObsBtn" class="primary" style="width:100%">💾 Добавить</button>
        <button id="cancelObsBtn" style="width:100%; margin-top:10px;">Отмена</button>
    </div>
</div>

<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let API_URL = "";
    let currentTelegramId = null;
    let currentUsername = null;
    let streamsData = [];
    let autoRefreshInterval = null;

    // ========== НАВИГАЦИЯ В БРАУЗЕРАХ ==========
    function navigateKick() {
        let url = document.getElementById('kickUrl').value.trim();
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('kickFrame').src = url;
    }

    function navigatePromo() {
        let url = document.getElementById('promoUrl').value.trim();
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('promoFrame').src = url;
    }

    // ========== РАБОТА С СЕРВЕРОМ ==========
    function saveServerConfig(ip) {
        localStorage.setItem('rosarbitr_server_ip', ip);
    }

    async function testServer(ip) {
        try {
            const url = `http://${ip}/login`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'test', password: 'test' })
            });
            return response.status === 401 || response.ok;
        } catch (e) {
            return false;
        }
    }

    async function connectToServer() {
        let ip = document.getElementById('serverInput').value.trim();
        const errorDiv = document.getElementById('serverError');
        
        if (!ip) {
            errorDiv.innerText = 'Введите адрес сервера';
            return;
        }
        
        ip = ip.replace('http://', '').replace('https://', '');
        errorDiv.innerText = '⏳ Проверка...';
        
        const alive = await testServer(ip);
        
        if (alive) {
            API_URL = `http://${ip}`;
            saveServerConfig(ip);
            errorDiv.innerText = '';
            document.getElementById('serverModal').classList.remove('active');
            document.getElementById('loginModal').classList.add('active');
        } else {
            errorDiv.innerText = '❌ Сервер недоступен';
        }
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function login(username, password) {
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            if (response.ok) {
                const data = await response.json();
                currentTelegramId = data.telegram_id;
                currentUsername = data.username;
                sessionStorage.setItem('telegram_id', currentTelegramId);
                sessionStorage.setItem('username', currentUsername);
                document.getElementById('userNameDisplay').innerText = currentUsername;
                return true;
            }
            return false;
        } catch (e) {
            return false;
        }
    }

    function logout() {
        sessionStorage.clear();
        currentTelegramId = null;
        currentUsername = null;
        document.getElementById('mainPanel').classList.add('hidden');
        document.getElementById('loginModal').classList.remove('active');
        document.getElementById('serverModal').classList.add('active');
        document.getElementById('userNameDisplay').innerText = 'Гость';
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    }

    // ========== ВОССТАНОВЛЕНИЕ СЕССИИ ==========
    function restoreSession() {
        const savedServer = localStorage.getItem('rosarbitr_server_ip');
        const savedId = sessionStorage.getItem('telegram_id');
        const savedName = sessionStorage.getItem('username');
        
        if (savedServer) {
            document.getElementById('serverInput').value = savedServer;
            API_URL = `http://${savedServer}`;
            
            if (savedId && savedName) {
                currentTelegramId = parseInt(savedId);
                currentUsername = savedName;
                document.getElementById('userNameDisplay').innerText = currentUsername;
                document.getElementById('serverModal').classList.remove('active');
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('mainPanel').classList.remove('hidden');
                loadStreams();
                startAutoRefresh();
                return true;
            } else {
                document.getElementById('serverModal').classList.remove('active');
                document.getElementById('loginModal').classList.add('active');
                return true;
            }
        }
        return false;
    }

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(() => {
            if (currentTelegramId && API_URL) loadStreams();
        }, 5000);
    }

    // ========== ЗАГРУЗКА СТРИМОВ ==========
    async function loadStreams() {
        if (!currentTelegramId || !API_URL) return;
        
        try {
            const response = await fetch(`${API_URL}/streams?user_id=${currentTelegramId}`);
            if (response.status === 401 || response.status === 403) {
                logout();
                return;
            }
            if (!response.ok) throw new Error();
            streamsData = await response.json();
            renderStreams();
        } catch (e) {
            document.getElementById('streamsList').innerHTML = '<div class="loading">❌ Ошибка загрузки стримов</div>';
        }
    }

    // ========== КОМАНДЫ ==========
    async function sendCommand(cmd) {
        if (!currentTelegramId || !API_URL) return;
        
        try {
            await fetch(`${API_URL}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd, user_id: currentTelegramId })
            });
            setTimeout(() => loadStreams(), 1000);
        } catch (e) {
            alert('❌ Ошибка отправки команды');
        }
    }

    // ========== ДОБАВЛЕНИЕ OBS ==========
    async function addOBS(name, host, port, password) {
        if (!currentTelegramId || !API_URL) return;
        
        const command = `${name}, ${host}, ${port}, ${password}`;
        try {
            await fetch(`${API_URL}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command, user_id: currentTelegramId })
            });
            alert(`✅ OBS "${name}" добавлен`);
            loadStreams();
        } catch (e) {
            alert(`❌ Ошибка: ${e.message}`);
        }
    }

    // ========== ОТРИСОВКА ==========
    function formatUptime(seconds) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        return `${hours}ч ${minutes}м`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderStreams() {
        const container = document.getElementById('streamsList');
        if (!streamsData.length) {
            container.innerHTML = '<div class="loading">🎬 Нет стримов. Нажмите "Добавить OBS"</div>';
            return;
        }
        
        let html = '';
        for (let s of streamsData) {
            const statusClass = s.running ? 'online' : 'offline';
            const statusText = s.running ? '🟢 ВКЛЮЧЕН' : '🔴 ВЫКЛЮЧЕН';
            const uptime = formatUptime(s.total_uptime_seconds || 0);
            const safeName = escapeHtml(s.name);
            
            html += `
                <div class="stream-card">
                    <div class="stream-header">
                        <span class="stream-name">🎥 ${safeName}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="stream-stats">
                        <span>💻 CPU ${s.cpu}%</span>
                        <span>🧠 RAM ${s.ram} MB</span>
                        <span>🎬 FPS ${s.fps}</span>
                        <span>📡 ${s.bitrate} kbps</span>
                        <span>⚠️ Потеря ${s.dropped}%</span>
                        <span>📈 Всего: ${uptime}</span>
                        <span>🔁 Рестартов: ${s.restart_count}</span>
                    </div>
                    <div class="stream-actions">
                        <button class="primary" onclick='sendCommand("on_${safeName}")'>▶️ Запустить</button>
                        <button onclick='sendCommand("off_${safeName}")'>⏹ Остановить</button>
                        <button onclick='sendCommand("restart_${safeName}")'>🔄 Перезапустить</button>
                        <button class="warning" onclick='sendCommand("reset_stats_${safeName}")'>📊 Сброс</button>
                        <button class="warning" onclick='sendCommand("delete_${safeName}")'>🗑 Удалить</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
    document.getElementById('connectBtn')?.addEventListener('click', connectToServer);
    
    document.getElementById('loginAction')?.addEventListener('click', async () => {
        const username = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!username || !password) {
            errorDiv.innerText = 'Введите логин и пароль';
            return;
        }
        
        errorDiv.innerText = '⏳ Вход...';
        const success = await login(username, password);
        
        if (success) {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('mainPanel').classList.remove('hidden');
            loadStreams();
            startAutoRefresh();
            document.getElementById('loginInput').value = '';
            document.getElementById('passwordInput').value = '';
            errorDiv.innerText = '';
        } else {
            errorDiv.innerText = '❌ Неверный логин или пароль';
        }
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        logout();
    });

    document.getElementById('refreshBtn')?.addEventListener('click', () => {
        loadStreams();
    });

    document.getElementById('addObsBtn')?.addEventListener('click', () => {
        document.getElementById('addObsModal').classList.add('active');
    });

    document.getElementById('saveObsBtn')?.addEventListener('click', () => {
        const name = document.getElementById('obsName').value.trim();
        const host = document.getElementById('obsHost').value.trim();
        const port = document.getElementById('obsPort').value;
        const password = document.getElementById('obsPassword').value;
        
        if (!name || !host || !port) {
            alert('Заполните название, адрес и порт');
            return;
        }
        
        addOBS(name, host, parseInt(port), password);
        document.getElementById('addObsModal').classList.remove('active');
        document.getElementById('obsName').value = '';
        document.getElementById('obsHost').value = '';
        document.getElementById('obsPort').value = '';
        document.getElementById('obsPassword').value = '';
    });

    document.getElementById('cancelObsBtn')?.addEventListener('click', () => {
        document.getElementById('addObsModal').classList.remove('active');
    });

    // ========== ЗАПУСК ==========
    if (!restoreSession()) {
        document.getElementById('serverModal').classList.add('active');
    }
</script>
</body>
</html>
