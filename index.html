<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RosArbitr</title>
    <style>
        /* Чисто базовые стили, чтобы не слепить глаза */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 16px;
            color: #eef2ff;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            background: #11131c;
            border: 1px solid #2a2f3f;
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-area span {
            background: #1e1f2e;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
        }
        button {
            background: #1e1f2e;
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }
        button.primary {
            background: #7c3aed;
            border-color: #a855f7;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #11131c;
            border: 1px solid #a855f7;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            background: #1e1f2e;
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            margin-bottom: 14px;
            color: white;
        }
        .error-text {
            color: #f87171;
            text-align: center;
            margin-top: 12px;
        }
        .hidden {
            display: none;
        }
        /* Панель управления (упрощённо) */
        .streams-grid {
            display: grid;
            gap: 16px;
        }
        .stream-card {
            background: #11131c;
            border: 1px solid #2a2f3f;
            border-radius: 20px;
            padding: 16px;
        }
        .status-badge.online { color: #4ade80; }
        .status-badge.offline { color: #f87171; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>RosArbitr</h1>
        </div>
        <div class="user-area">
            <span id="userNameDisplay">Гость</span>
            <button id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <!-- МОДАЛКА 1: ПОДКЛЮЧЕНИЕ К СЕРВЕРУ -->
    <div id="serverModal" class="modal active">
        <div class="modal-content">
            <h2>🔌 Подключение к серверу</h2>
            <input type="text" id="serverInput" placeholder="IP:порт (например 127.0.0.1:8081)">
            <button id="connectAction" class="primary" style="width:100%">Подключиться</button>
            <div id="serverMsg" class="error-text"></div>
        </div>
    </div>

    <!-- МОДАЛКА 2: ЛОГИН / ПАРОЛЬ -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Авторизация</h2>
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginAction" class="primary" style="width:100%">Войти</button>
            <div id="loginMsg" class="error-text"></div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ПАНЕЛЬ (стянутая копия, только для демо) -->
    <div id="mainPanel" class="hidden">
        <div style="text-align:center; padding:20px;">
            <p>✅ Вы успешно вошли в систему как <span id="activeUser">-</span></p>
            <div id="streamsList" class="streams-grid">
                <div class="stream-card">📺 Здесь будут ваши стримы после добавления OBS</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Логика: сначала модалка сервера -> после успеха модалка логина -> после успеха панель

    let apiBaseUrl = "";
    let currentTelegramId = null;

    // Элементы
    const serverModal = document.getElementById('serverModal');
    const loginModal = document.getElementById('loginModal');
    const mainPanel = document.getElementById('mainPanel');
    const serverInput = document.getElementById('serverInput');
    const connectBtn = document.getElementById('connectAction');
    const serverMsg = document.getElementById('serverMsg');
    const loginInput = document.getElementById('loginInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginAction');
    const loginMsg = document.getElementById('loginMsg');
    const logoutBtn = document.getElementById('logoutBtn');
    const userNameSpan = document.getElementById('userNameDisplay');
    const activeUserSpan = document.getElementById('activeUser');

    // Функция проверки живости сервера (тупо шлём login с левыми данными)
    async function testServer(ipPort) {
        const url = `http://${ipPort}/login`;
        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'ping', password: 'ping' })
            });
            // Если сервер ответил (401 или 200) - значит жив
            return resp.status === 401 || resp.ok;
        } catch (e) {
            return false;
        }
    }

    // Шаг 1: подключаемся к серверу
    connectBtn.onclick = async () => {
        let raw = serverInput.value.trim();
        if (!raw) {
            serverMsg.innerText = 'Введите адрес сервера';
            return;
        }
        raw = raw.replace('http://', '').replace('https://', '');
        serverMsg.innerText = '⏳ Проверка...';
        
        const alive = await testServer(raw);
        if (!alive) {
            serverMsg.innerText = '❌ Сервер недоступен';
            return;
        }
        apiBaseUrl = `http://${raw}`;
        // Сохраняем в локальное хранилище, чтобы при перезагрузке страницы не вводить заново
        localStorage.setItem('rosarbitr_server', raw);
        serverMsg.innerText = '';
        // Закрываем модалку сервера, открываем модалку логина
        serverModal.classList.remove('active');
        loginModal.classList.add('active');
    };

    // Шаг 2: логинимся
    loginBtn.onclick = async () => {
        const login = loginInput.value.trim();
        const pass = passwordInput.value.trim();
        if (!login || !pass) {
            loginMsg.innerText = 'Введите логин и пароль';
            return;
        }
        loginMsg.innerText = '⏳ Вход...';
        try {
            const resp = await fetch(`${apiBaseUrl}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: login, password: pass })
            });
            if (!resp.ok) throw new Error('auth failed');
            const data = await resp.json();
            currentTelegramId = data.telegram_id;
            const username = data.username || login;
            sessionStorage.setItem('rosarbitr_user_id', currentTelegramId);
            sessionStorage.setItem('rosarbitr_user_name', username);
            userNameSpan.innerText = username;
            activeUserSpan.innerText = username;
            // Убираем модалку логина, показываем панель
            loginModal.classList.remove('active');
            mainPanel.classList.remove('hidden');
            // Здесь можно подгрузить реальные стримы через /streams, но для теста хватит
        } catch (e) {
            loginMsg.innerText = '❌ Неверный логин или пароль';
        }
    };

    // Выход
    logoutBtn.onclick = () => {
        sessionStorage.clear();
        currentTelegramId = null;
        mainPanel.classList.add('hidden');
        loginModal.classList.remove('active');
        serverModal.classList.add('active');
        loginInput.value = '';
        passwordInput.value = '';
        serverInput.value = localStorage.getItem('rosarbitr_server') || '';
        userNameSpan.innerText = 'Гость';
        loginMsg.innerText = '';
        serverMsg.innerText = '';
    };

    // Восстановление сессии при загрузке (если был сохранён сервер и юзер)
    function restoreSession() {
        const savedServer = localStorage.getItem('rosarbitr_server');
        const savedUserId = sessionStorage.getItem('rosarbitr_user_id');
        const savedUserName = sessionStorage.getItem('rosarbitr_user_name');
        
        if (savedServer) {
            serverInput.value = savedServer;
            apiBaseUrl = `http://${savedServer}`;
        }
        if (savedUserId && savedUserName && savedServer) {
            // Проверять живой ли сервер не будем, просто попробуем взять стримы
            apiBaseUrl = `http://${savedServer}`;
            currentTelegramId = parseInt(savedUserId);
            userNameSpan.innerText = savedUserName;
            activeUserSpan.innerText = savedUserName;
            serverModal.classList.remove('active');
            loginModal.classList.remove('active');
            mainPanel.classList.remove('hidden');
            // тут можно вызвать loadStreams
        } else {
            serverModal.classList.add('active');
        }
    }

    restoreSession();
</script>
</body>
</html>
