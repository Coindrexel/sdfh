<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RosArbitr</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0c12;font-family:system-ui,sans-serif;padding:16px;color:#eef2ff}.container{max-width:1600px;margin:0 auto}.header{background:#11131c;border:1px solid #2a2f3f;border-radius:24px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.logo h1{font-size:24px;background:linear-gradient(135deg,#fff,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}.username{background:#1e1f2e;padding:6px 14px;border-radius:40px;font-size:14px}button{background:#1e1f2e;border:1px solid #2a2f3f;border-radius:40px;padding:8px 14px;color:#e2e8f0;cursor:pointer}button.primary{background:#7c3aed;border-color:#a855f7;color:white}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:1000;padding:16px}.modal.active{display:flex}.modal-content{background:#11131c;border:1px solid #a855f7;border-radius:28px;padding:24px;width:100%;max-width:400px}.modal-content h2{text-align:center;margin-bottom:20px}input{background:#1e1f2e;border:1px solid #2a2f3f;border-radius:40px;padding:12px 18px;width:100%;margin-bottom:14px;color:white}.error-text{color:#f87171;text-align:center;margin-top:12px}.hidden{display:none}.browsers-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}.browser-card{background:#11131c;border:1px solid #2a2f3f;border-radius:20px;overflow:hidden}.browser-header{background:#1e1f2e;padding:10px 14px;font-weight:600;border-bottom:1px solid #2a2f3f;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.url-input{flex:1;min-width:150px;background:#0f1119;border:1px solid #2a2f3f;border-radius:40px;padding:8px 14px;color:white}.go-btn{background:#7c3aed;border:none;border-radius:40px;padding:8px 16px;color:white;cursor:pointer}.browser-frame{width:100%;height:400px;border:none;background:#0f1119}.section-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}.streams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px}.stream-card{background:#11131c;border:1px solid #2a2f3f;border-radius:20px;overflow:hidden}.stream-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1f2e}.stream-name{font-weight:700;font-size:16px}.status-badge{font-size:11px;padding:4px 10px;border-radius:40px;background:#1e1f2e}.status-badge.online{background:#1e3a2e;color:#4ade80;border:1px solid #2e7d32}.status-badge.offline{background:#3b1e1e;color:#f87171;border:1px solid #b91c1c}.stream-stats{padding:10px 16px;background:#0f1119;font-size:11px;color:#9ca3af;display:flex;flex-wrap:wrap;gap:12px;border-bottom:1px solid #1e1f2e}.stream-actions{padding:14px 16px;display:flex;flex-wrap:wrap;gap:8px}.loading{text-align:center;padding:40px;color:#9ca3af}.user-area{display:flex;align-items:center;gap:12px}@media (max-width:640px){.browser-frame{height:300px}.streams-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>RosArbitr</h1></div>
        <div class="user-area">
            <span class="username" id="userNameDisplay">Гость</span>
            <button id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <div id="serverModal" class="modal active">
        <div class="modal-content">
            <h2>🔌 Подключение к серверу</h2>
            <input type="text" id="serverInput" placeholder="АДРЕС">
            <button id="connectBtn" class="primary" style="width:100%">Подключиться</button>
            <div id="serverError" class="error-text"></div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Авторизация</h2>
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginAction" class="primary" style="width:100%">Войти</button>
            <div id="loginError" class="error-text"></div>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="browsers-section">
            <div class="browser-card">
                <div class="browser-header">
                    <span>🎥 KICK</span>
                    <input type="text" id="kickUrl" class="url-input" value="https://kick.com/">
                    <button class="go-btn" onclick="navigateKick()">Перейти</button>
                </div>
                <iframe id="kickFrame" class="browser-frame" src="https://kick.com/"></iframe>
            </div>
            <div class="browser-card">
                <div class="browser-header">
                    <span>⚡ Накрутка</span>
                    <input type="text" id="promoUrl" class="url-input" value="https://stream-promotion.ru/">
                    <button class="go-btn" onclick="navigatePromo()">Перейти</button>
                </div>
                <iframe id="promoFrame" class="browser-frame" src="https://stream-promotion.ru/"></iframe>
            </div>
        </div>
        <div class="section-header">
            <h2>🎛️ Управление стримами</h2>
            <div>
                <button id="refreshBtn">🔄 Обновить</button>
                <button id="addObsBtn" class="primary">➕ Добавить OBS</button>
            </div>
        </div>
        <div id="streamsList" class="streams-grid"><div class="loading">Загрузка стримов...</div></div>
    </div>
</div>

<div id="addObsModal" class="modal">
    <div class="modal-content">
        <h2>➕ Добавить OBS</h2>
        <input type="text" id="obsName" placeholder="Название">
        <input type="text" id="obsHost" placeholder="АДРЕС">
        <input type="number" id="obsPort" placeholder="Порт">
        <input type="password" id="obsPassword" placeholder="Пароль">
        <button id="saveObsBtn" class="primary" style="width:100%">💾 Добавить</button>
        <button id="cancelObsBtn" style="width:100%; margin-top:10px;">Отмена</button>
    </div>
</div>

<script>
    let API_URL="",currentTelegramId=null,currentUsername=null,streamsData=[],autoRefreshInterval=null;
    function navigateKick(){let e=document.getElementById('kickUrl').value.trim();e.startsWith('http')||(e='https://'+e),document.getElementById('kickFrame').src=e}
    function navigatePromo(){let e=document.getElementById('promoUrl').value.trim();e.startsWith('http')||(e='https://'+e),document.getElementById('promoFrame').src=e}
    function saveServerConfig(e){localStorage.setItem('rosarbitr_server_ip',e)}
    async function testServer(e){try{let t=await fetch(`http://${e}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'test',password:'test'})});return t.status===401||t.ok}catch(t){return!1}}
    async function connectToServer(){let e=document.getElementById('serverInput').value.trim(),t=document.getElementById('serverError');if(!e){t.innerText='Введите адрес сервера';return}e=e.replace('http://','').replace('https://',''),t.innerText='⏳ Проверка...';let n=await testServer(e);if(n){API_URL=`http://${e}`,saveServerConfig(e),t.innerText='',document.getElementById('serverModal').classList.remove('active'),document.getElementById('loginModal').classList.add('active')}else t.innerText='❌ Сервер недоступен'}
    async function login(e,t){try{let n=await fetch(`${API_URL}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:e,password:t})});if(n.ok){let o=await n.json();return currentTelegramId=o.telegram_id,currentUsername=o.username,sessionStorage.setItem('telegram_id',currentTelegramId),sessionStorage.setItem('username',currentUsername),document.getElementById('userNameDisplay').innerText=currentUsername,!0}return!1}catch(n){return!1}}
    function logout(){sessionStorage.clear(),currentTelegramId=null,currentUsername=null,document.getElementById('mainPanel').classList.add('hidden'),document.getElementById('loginModal').classList.remove('active'),document.getElementById('serverModal').classList.add('active'),document.getElementById('userNameDisplay').innerText='Гость',autoRefreshInterval&&clearInterval(autoRefreshInterval)}
    function restoreSession(){let e=localStorage.getItem('rosarbitr_server_ip'),t=sessionStorage.getItem('telegram_id'),n=sessionStorage.getItem('username');if(e){if(document.getElementById('serverInput').value=e,API_URL=`http://${e}`,t&&n)return currentTelegramId=parseInt(t),currentUsername=n,document.getElementById('userNameDisplay').innerText=currentUsername,document.getElementById('serverModal').classList.remove('active'),document.getElementById('loginModal').classList.remove('active'),document.getElementById('mainPanel').classList.remove('hidden'),loadStreams(),startAutoRefresh(),!0;document.getElementById('serverModal').classList.remove('active'),document.getElementById('loginModal').classList.add('active')}return!1}
    function startAutoRefresh(){autoRefreshInterval&&clearInterval(autoRefreshInterval),autoRefreshInterval=setInterval(()=>{currentTelegramId&&API_URL&&loadStreams()},5e3)}
    async function loadStreams(){if(!currentTelegramId||!API_URL)return;try{let e=await fetch(`${API_URL}/streams?user_id=${currentTelegramId}`);if(e.status===401||e.status===403){logout();return}if(!e.ok)throw new Error;streamsData=await e.json(),renderStreams()}catch(e){document.getElementById('streamsList').innerHTML='<div class="loading">❌ Ошибка загрузки стримов</div>'}}
    async function sendCommand(e){if(!currentTelegramId||!API_URL)return;try{await fetch(`${API_URL}/command`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:e,user_id:currentTelegramId})}),setTimeout(()=>loadStreams(),1e3)}catch(e){alert('❌ Ошибка отправки команды')}}
    async function addOBS(e,t,n,o){if(!currentTelegramId||!API_URL)return;let r=`${e}, ${t}, ${n}, ${o}`;try{await fetch(`${API_URL}/command`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:r,user_id:currentTelegramId})}),alert(`✅ OBS "${e}" добавлен`),loadStreams()}catch(e){alert(`❌ Ошибка: ${e.message}`)}}
    function formatUptime(e){let t=Math.floor(e/3600),n=Math.floor(e%3600/60);return`${t}ч ${n}м`}
    function escapeHtml(e){return e.replace(/[&<>]/g,e=>{if(e==='&')return'&amp;';if(e==='<')return'&lt;';if(e==='>')return'&gt;';return e})}
    function renderStreams(){let e=document.getElementById('streamsList');if(!streamsData.length){e.innerHTML='<div class="loading">🎬 Нет стримов. Нажмите "Добавить OBS"</div>';return}let t='';for(let n of streamsData){let o=n.running?'online':'offline',r=n.running?'🟢 ВКЛЮЧЕН':'🔴 ВЫКЛЮЧЕН',s=formatUptime(n.total_uptime_seconds||0),i=escapeHtml(n.name);t+=`
                <div class="stream-card">
                    <div class="stream-header">
                        <span class="stream-name">🎥 ${i}</span>
                        <span class="status-badge ${o}">${r}</span>
                    </div>
                    <div class="stream-stats">
                        <span>💻 CPU ${n.cpu}%</span>
                        <span>🧠 RAM ${n.ram} MB</span>
                        <span>🎬 FPS ${n.fps}</span>
                        <span>📡 ${n.bitrate} kbps</span>
                        <span>⚠️ Потеря ${n.dropped}%</span>
                        <span>📈 Всего: ${s}</span>
                        <span>🔁 Рестартов: ${n.restart_count}</span>
                    </div>
                    <div class="stream-actions">
                        <button class="primary" onclick='sendCommand("on_${i}")'>▶️ Запустить</button>
                        <button onclick='sendCommand("off_${i}")'>⏹ Остановить</button>
                        <button onclick='sendCommand("restart_${i}")'>🔄 Перезапустить</button>
                        <button class="warning" onclick='sendCommand("reset_stats_${i}")'>📊 Сброс</button>
                        <button class="warning" onclick='sendCommand("delete_${i}")'>🗑 Удалить</button>
                    </div>
                </div>`}e.innerHTML=t}
    document.getElementById('connectBtn')?.addEventListener('click',connectToServer);
    document.getElementById('loginAction')?.addEventListener('click',async()=>{let e=document.getElementById('loginInput').value.trim(),t=document.getElementById('passwordInput').value,n=document.getElementById('loginError');if(!e||!t){n.innerText='Введите логин и пароль';return}n.innerText='⏳ Вход...';let o=await login(e,t);if(o){document.getElementById('loginModal').classList.remove('active'),document.getElementById('mainPanel').classList.remove('hidden'),loadStreams(),startAutoRefresh(),document.getElementById('loginInput').value='',document.getElementById('passwordInput').value='',n.innerText=''}else n.innerText='❌ Неверный логин или пароль'});
    document.getElementById('logoutBtn')?.addEventListener('click',()=>{logout()});
    document.getElementById('refreshBtn')?.addEventListener('click',()=>{loadStreams()});
    document.getElementById('addObsBtn')?.addEventListener('click',()=>{document.getElementById('addObsModal').classList.add('active')});
    document.getElementById('saveObsBtn')?.addEventListener('click',()=>{let e=document.getElementById('obsName').value.trim(),t=document.getElementById('obsHost').value.trim(),n=document.getElementById('obsPort').value,o=document.getElementById('obsPassword').value;if(!e||!t||!n){alert('Заполните название, адрес и порт');return}addOBS(e,t,parseInt(n),o),document.getElementById('addObsModal').classList.remove('active'),document.getElementById('obsName').value='',document.getElementById('obsHost').value='',document.getElementById('obsPort').value='',document.getElementById('obsPassword').value=''});
    document.getElementById('cancelObsBtn')?.addEventListener('click',()=>{document.getElementById('addObsModal').classList.remove('active')});
    restoreSession()||document.getElementById('serverModal').classList.add('active');
</script>
</body>
</html>
